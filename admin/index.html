<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGI Pakistan | Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161d;
      --surface-2: #1a1e28;
      --border:    #252a38;
      --border-2:  #2e3447;
      --text:      #e8eaf0;
      --text-2:    #9299ae;
      --text-3:    #5a6178;
      --accent:    #4f6ef7;
      --accent-dim:#1e2a5e;
      --green:     #22c55e;
      --green-dim: #0f2d1f;
      --red:       #ef4444;
      --red-dim:   #2d0f0f;
      --amber:     #f59e0b;
      --amber-dim: #2d200a;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login ───────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 22px;
    }
    .login-logo strong { display: block; font-size: 1.3rem; color: var(--text); letter-spacing: 0; text-transform: none; margin-bottom: 2px; }

    /* ── Shell ───────────────────────────────────────────── */
    #admin-shell { display: none; min-height: 100vh; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-brand { font-weight: 600; font-size: 0.92rem; color: var(--text); }
    .topbar-brand span { color: var(--text-3); font-weight: 400; margin-left: 10px; font-size: 0.78rem; }

    .main { padding: 28px; max-width: 1100px; margin: 0 auto; }

    /* ── Stats row ───────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-card {
      flex: 1;
      min-width: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
    }
    .stat-label { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
    .stat-value { font-size: 1.4rem; font-weight: 600; color: var(--text); }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }

    /* ── Toggle ──────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: fit-content;
      overflow: hidden;
    }
    .toggle-btn {
      padding: 9px 22px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-2);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Table ───────────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      max-width: 100%;
    }
    table { width: 100%; min-width: 900px; border-collapse: collapse; font-size: 0.82rem; table-layout: auto; }
    thead th {
      padding: 11px 14px;
      text-align: left;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    td { padding: 12px 14px; color: var(--text); vertical-align: middle; }
    td.muted { color: var(--text-2); }

    .chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
    }
    .chip.pending  { background: var(--amber-dim); color: var(--amber); border-color: rgba(245,158,11,0.25); }
    .chip.approved { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.25); }
    .chip.declined { background: var(--red-dim);   color: var(--red);   border-color: rgba(239,68,68,0.25); }

    .action-btn {
      padding: 6px 14px;
      font-size: 0.76rem;
      font-weight: 600;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-block;
      margin-right: 6px;
    }
.action-btn:hover { opacity: 0.8; transform: translateY(-1px); }
    .action-btn.approve { background: #22c55e; color: #fff; }
    .action-btn.decline { background: #ef4444; color: #fff; }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .empty-row td { text-align: center; color: var(--text-3); padding: 36px; }

    /* ── Shared field/button ─────────────────────────────── */
    .field { display: grid; gap: 5px; margin-bottom: 14px; }
    .field label { font-size: 0.75rem; color: var(--text-2); }
    .field input {
      width: 100%; height: 40px; padding: 0 12px;
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: var(--radius); color: var(--text); font-size: 0.88rem; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn {
      width: 100%; height: 40px; border-radius: var(--radius);
      background: var(--accent); color: #fff;
      font-size: 0.88rem; font-weight: 600; border: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.ghost {
      background: transparent; border: 1px solid var(--border-2); color: var(--text-2);
      font-size: 0.78rem; height: 34px; width: auto; padding: 0 16px;
    }

    .feedback { margin-top: 10px; font-size: 0.8rem; min-height: 18px; }
    .feedback.error { color: var(--red); }
    .feedback.success { color: var(--green); }
    .feedback.info { color: var(--text-2); }

    .loading { color: var(--text-3); font-size: 0.82rem; padding: 32px; text-align: center; }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      CGI Pakistan
      <strong>Admin Panel</strong>
    </div>
    <div class="field">
      <label for="admin-email">Email</label>
      <input id="admin-email" type="email" placeholder="admin@cgi.pk" autocomplete="email">
    </div>
    <div class="field">
      <label for="admin-password">Password</label>
      <input id="admin-password" type="password" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn" id="login-btn">Sign In</button>
    <div class="feedback" id="login-feedback"></div>
  </div>
</div>

<!-- ── Admin Shell ─────────────────────────────────────────── -->
<div id="admin-shell">
  <header class="topbar">
    <div class="topbar-brand">
      CGI Pakistan <span>Admin Panel</span>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span style="font-size:0.78rem; color:var(--text-3);" id="admin-name-label"></span>
      <button class="btn ghost" id="logout-btn">Sign Out</button>
    </div>
  </header>

  <div class="main">

    <div class="stats-bar" id="stats-bar">
      <div class="stat-card"><div class="stat-label">Pending Investments</div><div class="stat-value amber" id="stat-inv-pending">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Investments</div><div class="stat-value" id="stat-inv-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Pending Withdrawals</div><div class="stat-value amber" id="stat-wd-pending">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Withdrawals</div><div class="stat-value" id="stat-wd-total">—</div></div>
    </div>

    <div class="toggle-row">
      <button class="toggle-btn active" id="tab-investments">Investment Requests</button>
      <button class="toggle-btn" id="tab-withdrawals">Withdrawal Requests</button>
    </div>

    <div class="table-wrap">
      <div class="loading" id="table-loading">Loading...</div>
      <table id="requests-table" style="display:none;">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  const API = "https://alsininvestment.com/api";
  let token = null;
  let currentTab = "investments";
  let allInvestments = [];
  let allWithdrawals = [];

  // ── Helpers ──────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const fmt = (n) => "PKR " + Number(n).toLocaleString("en-PK", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtDate = (ts) => ts ? new Date(Number(ts)).toLocaleString("en-PK", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" }) : "—";

  // ── Auth ──────────────────────────────────────────────────
  $("admin-password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  $("login-btn").addEventListener("click", doLogin);

  async function doLogin() {
    const email = $("admin-email").value.trim();
    const pass  = $("admin-password").value;
    const fb    = $("login-feedback");
    if (!email || !pass) { fb.textContent = "Enter email and password."; fb.className = "feedback error"; return; }

    $("login-btn").disabled = true;
    $("login-btn").textContent = "Signing in...";
    fb.textContent = "";

    try {
      const res  = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();

      if (!res.ok) { throw new Error(data.error || "Login failed"); }
      if (data.user.role !== "admin") { throw new Error("Access denied — not an admin account."); }

      token = data.token;
      $("admin-name-label").textContent = data.user.username;
      $("login-screen").style.display = "none";
      $("admin-shell").style.display  = "block";
      loadAll();
    } catch (err) {
      fb.textContent = err.message;
      fb.className   = "feedback error";
    } finally {
      $("login-btn").disabled = false;
      $("login-btn").textContent = "Sign In";
    }
  }

  $("logout-btn").addEventListener("click", () => {
    token = null;
    $("admin-shell").style.display  = "none";
    $("login-screen").style.display = "flex";
    $("admin-email").value = "";
    $("admin-password").value = "";
  });

  // ── Data loading ──────────────────────────────────────────
  async function loadAll() {
    showLoading();
    try {
      const [invRes, wdRes] = await Promise.all([
        fetch(`${API}/admin/investments`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${API}/admin/withdrawals`,  { headers: { Authorization: `Bearer ${token}` } })
      ]);
      allInvestments = invRes.ok  ? await invRes.json()  : [];
      allWithdrawals = wdRes.ok   ? await wdRes.json()   : [];
      updateStats();
      renderTable();
    } catch {
      showLoading("Failed to load data. Check your connection.");
    }
  }

  function updateStats() {
    $("stat-inv-pending").textContent = allInvestments.filter(r => r.status === "pending").length;
    $("stat-inv-total").textContent   = allInvestments.length;
    $("stat-wd-pending").textContent  = allWithdrawals.filter(r => r.status === "pending").length;
    $("stat-wd-total").textContent    = allWithdrawals.length;
  }

  // ── Tabs ──────────────────────────────────────────────────
  $("tab-investments").addEventListener("click", () => {
    currentTab = "investments";
    $("tab-investments").classList.add("active");
    $("tab-withdrawals").classList.remove("active");
    renderTable();
  });
  $("tab-withdrawals").addEventListener("click", () => {
    currentTab = "withdrawals";
    $("tab-withdrawals").classList.add("active");
    $("tab-investments").classList.remove("active");
    renderTable();
  });

  // ── Render ────────────────────────────────────────────────
  function showLoading(msg = "Loading...") {
    $("table-loading").textContent = msg;
    $("table-loading").style.display = "block";
    $("requests-table").style.display = "none";
  }

  function renderTable() {
    const data = currentTab === "investments" ? allInvestments : allWithdrawals;

    $("table-loading").style.display = "none";
    $("requests-table").style.display = "table";

    if (currentTab === "investments") {
      $("table-head").innerHTML = `<tr>
        <th>ID</th><th>User</th><th>Member ID</th><th>Package</th>
        <th>Units</th><th>Amount</th><th>Account Sent From</th>
        <th>Status</th><th>Submitted</th><th>Reviewed</th><th>Actions</th>
      </tr>`;
    } else {
      $("table-head").innerHTML = `<tr>
        <th>ID</th><th>User</th><th>Member ID</th><th>Package</th>
        <th>Amount</th><th>Bank</th><th>Account Title</th><th>Account Number</th>
        <th>Status</th><th>Submitted</th><th>Reviewed</th><th>Actions</th>
      </tr>`;
    }

    if (!data.length) {
      $("table-body").innerHTML = `<tr class="empty-row"><td colspan="12">No requests found.</td></tr>`;
      return;
    }

    $("table-body").innerHTML = data.map(r => {
      const isPending = r.status === "pending";
      const actions = isPending
        ? `<button class="action-btn approve" onclick="handleAction('${r.id}','approve')">Approve</button>
           <button class="action-btn decline" onclick="handleAction('${r.id}','decline')" style="margin-left:6px;">Decline</button>`
        : `<span style="color:var(--text-3);font-size:0.75rem;">—</span>`;

      if (currentTab === "investments") {
        return `<tr id="row-${r.id}">
          <td class="muted" style="font-size:0.72rem;">${r.id}</td>
          <td><strong>${esc(r.username)}</strong><br><span style="color:var(--text-3);font-size:0.72rem;">${esc(r.email)}</span></td>
          <td class="muted">${esc(r.member_id || "—")}</td>
          <td>${esc(r.package_code)}</td>
          <td>${r.units}</td>
          <td><strong>${fmt(r.amount)}</strong></td>
          <td class="muted">${esc(r.sender_account_number || "—")}</td>
          <td><span class="chip ${r.status}">${r.status}</span></td>
          <td class="muted">${fmtDate(r.created_at)}</td>
          <td class="muted">${fmtDate(r.reviewed_at)}</td>
          <td>${actions}</td>
        </tr>`;
      } else {
        return `<tr id="row-${r.id}">
          <td class="muted" style="font-size:0.72rem;">${r.id}</td>
          <td><strong>${esc(r.username)}</strong><br><span style="color:var(--text-3);font-size:0.72rem;">${esc(r.email)}</span></td>
          <td class="muted">${esc(r.member_id || "—")}</td>
          <td>${esc(r.package_code)}</td>
          <td><strong>${fmt(r.amount)}</strong></td>
          <td class="muted">${esc(r.bank_name || "—")}</td>
          <td class="muted">${esc(r.account_title || "—")}</td>
          <td class="muted" style="font-family:monospace;">${esc(r.account_number || "—")}</td>
          <td><span class="chip ${r.status}">${r.status}</span></td>
          <td class="muted">${fmtDate(r.created_at)}</td>
          <td class="muted">${fmtDate(r.reviewed_at)}</td>
          <td>${actions}</td>
        </tr>`;
      }
    }).join("");
  }

  // ── Actions ───────────────────────────────────────────────
  async function handleAction(id, action) {
    const row = document.getElementById(`row-${id}`);
    const btns = row ? row.querySelectorAll(".action-btn") : [];
    btns.forEach(b => b.disabled = true);

    const endpoint = currentTab === "investments"
      ? `${API}/admin/investments/${id}`
      : `${API}/admin/withdrawals/${id}`;

    try {
      const res  = await fetch(endpoint, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ action })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Action failed");

      // Update local data and re-render
      const list = currentTab === "investments" ? allInvestments : allWithdrawals;
      const item = list.find(r => r.id === id);
      if (item) {
        item.status = action === "approve" ? "approved" : "declined";
        item.reviewed_at = data.reviewedAt || Date.now();
      }
      updateStats();
      renderTable();
    } catch (err) {
      btns.forEach(b => b.disabled = false);
      alert("Error: " + err.message);
    }
  }

  // ── XSS escape ────────────────────────────────────────────
  function esc(str) {
    return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
