name: Build and Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - run: zip -r ghani-cpanel-encrypted.zip dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ghani-cpanel-encrypted
          path: ghani-cpanel-encrypted.zip
